<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login - Fanni Pro Dammam</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .login-card {
            background: white;
            border-radius: 15px;
            padding: 40px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            width: 100%;
            max-width: 400px;
        }
        .logo {
            text-align: center;
            margin-bottom: 30px;
        }
        .logo img {
            max-width: 120px;
        }
        .form-control:focus {
            border-color: #764ba2;
            box-shadow: 0 0 0 0.25rem rgba(118, 75, 162, 0.25);
        }
        .btn-login {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border: none;
            color: white;
            padding: 12px;
            font-weight: 600;
            margin-top: 20px;
        }
        .btn-login:hover {
            color: white;
            transform: translateY(-2px);
            transition: all 0.3s;
        }
        .alert {
            display: none;
        }
    </style>
</head>
<body>
    <div class="login-card">
        <div class="logo">
            <h3 class="text-primary">🔐 Admin Login</h3>
            <p class="text-muted">Fanni Pro Dammam Control Panel</p>
        </div>
        
        <div id="errorAlert" class="alert alert-danger" role="alert">
            <!-- Error message will be shown here -->
        </div>
        
        <div id="successAlert" class="alert alert-success" role="alert">
            <!-- Success message will be shown here -->
        </div>
        
        <form id="loginForm">
            <div class="mb-3">
                <label for="username" class="form-label">Username</label>
                <input type="text" class="form-control" id="username" name="username" 
                       placeholder="Enter username" required autofocus>
            </div>
            
            <div class="mb-3">
                <label for="password" class="form-label">Password</label>
                <input type="password" class="form-control" id="password" name="password" 
                       placeholder="Enter password" required>
            </div>
            
            <div class="d-grid">
                <button type="submit" class="btn btn-login btn-lg" id="loginBtn">
                    <span id="btnText">Login</span>
                    <span id="btnSpinner" class="spinner-border spinner-border-sm d-none" role="status"></span>
                </button>
            </div>
            
            <div class="text-center mt-3">
                <small class="text-muted">
                    Default: admin / admin123
                </small>
            </div>
        </form>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', function() {
            const loginForm = document.getElementById('loginForm');
            const loginBtn = document.getElementById('loginBtn');
            const btnText = document.getElementById('btnText');
            const btnSpinner = document.getElementById('btnSpinner');
            const errorAlert = document.getElementById('errorAlert');
            const successAlert = document.getElementById('successAlert');
            
            // Function to show error message
            function showError(message) {
                errorAlert.innerHTML = message;
                errorAlert.style.display = 'block';
                successAlert.style.display = 'none';
            }
            
            // Function to show success message
            function showSuccess(message) {
                successAlert.innerHTML = message;
                successAlert.style.display = 'block';
                errorAlert.style.display = 'none';
            }
            
            // Function to hide all alerts
            function hideAlerts() {
                errorAlert.style.display = 'none';
                successAlert.style.display = 'none';
            }
            
            // Login form submit handler
            loginForm.addEventListener('submit', async function(e) {
                e.preventDefault();
                
                const username = document.getElementById('username').value.trim();
                const password = document.getElementById('password').value.trim();
                
                // Validation
                if (!username || !password) {
                    showError('Please enter both username and password');
                    return;
                }
                
                // Show loading state
                loginBtn.disabled = true;
                btnText.textContent = 'Logging in...';
                btnSpinner.classList.remove('d-none');
                hideAlerts();
                
                try {
                    // Send login request
                    const response = await fetch('/api/admin/login', {
                        method: 'POST',
                        headers: {
                            'Content-Type': 'application/json'
                        },
                        body: JSON.stringify({ username, password })
                    });
                    
                    const result = await response.json();
                    
                    if (result.success) {
                        showSuccess('Login successful! Redirecting...');
                        
                        // Redirect after 1 second
                        setTimeout(() => {
                            if (result.redirect) {
                                window.location.href = result.redirect;
                            } else {
                                window.location.href = '/admin/dashboard';
                            }
                        }, 1000);
                    } else {
                        showError(result.message || 'Invalid credentials');
                        resetButton();
                    }
                } catch (error) {
                    console.error('Login error:', error);
                    showError('Network error. Please check your connection.');
                    resetButton();
                }
            });
            
            // Function to reset button state
            function resetButton() {
                loginBtn.disabled = false;
                btnText.textContent = 'Login';
                btnSpinner.classList.add('d-none');
            }
            
            // Clear errors on input
            document.getElementById('username').addEventListener('input', hideAlerts);
            document.getElementById('password').addEventListener('input', hideAlerts);
            
            // Auto-focus on username field
            document.getElementById('username').focus();
            
            // Check if already logged in
            checkAuth();
            
            async function checkAuth() {
                try {
                    const response = await fetch('/api/admin/check-auth');
                    const result = await response.json();
                    
                    if (result.authenticated) {
                        window.location.href = '/admin/dashboard';
                    }
                } catch (error) {
                    console.log('Not authenticated');
                }
            }
        });
    </script>
    
    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
